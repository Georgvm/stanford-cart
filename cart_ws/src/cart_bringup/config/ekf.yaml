# robot_localization EKF + GPS fusion.
# Two-stage: ekf_local (odom -> base_link) + ekf_global (map -> odom),
# the latter consumes /odometry/gps from navsat_transform_node.
#
# IMU NOTE: the cart does NOT currently have an IMU (BerryIMU pending).
# Without a gyro, cuVSLAM / EKF orientation will drift.
# When the IMU lands, set imu0_config rows accordingly.

ekf_local:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /visual_slam/tracking/odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: true
    odom0_queue_size: 10

    # Disabled until BerryIMU arrives. Uncomment after.
    # imu0: /imu/data
    # imu0_config: [false, false, false,
    #               true,  true,  true,
    #               false, false, false,
    #               true,  true,  true,
    #               true,  true,  true]
    # imu0_differential: false
    # imu0_remove_gravitational_acceleration: true

ekf_global:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: /visual_slam/tracking/odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false

navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.232  # ~13.3° E for Stanford
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: true
    publish_filtered_gps: true
    use_odometry_yaw: true
    wait_for_datum: false
