# Nav2 params for a slow GPS-waypoint-following golf cart.
# Output goes to /cmd_vel_nav (NOT /cmd_vel) — safety_gate is the only
# node that publishes /cmd_vel.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered/global
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    cmd_vel_topic: /cmd_vel_nav    # safety_gate consumes this
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.6
      yaw_goal_tolerance: 0.6
      stateful: true

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 1.5
      lookahead_dist: 2.5
      min_lookahead_dist: 1.2
      max_lookahead_dist: 4.0
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.5
      regulated_linear_scaling_min_speed: 0.4
      use_rotate_to_heading: false
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 12
      height: 12
      resolution: 0.1
      robot_radius: 0.7
      plugins: [nvblox_layer, inflation_layer]

      nvblox_layer:
        plugin: nvblox::nav2::NvbloxCostmapLayer
        nvblox_map_layer_name: static_occupancy

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 1.2
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.7
      resolution: 0.2
      track_unknown_space: false
      rolling_window: false
      plugins: [static_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 1.5
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner::SmacPlannerHybrid
      tolerance: 0.5
      motion_model_for_search: REEDS_SHEPP
      minimum_turning_radius: 2.5     # cart-specific; verify
      reverse_penalty: 5.0            # discourage reverse for v0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: true
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0
